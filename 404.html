<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--teal:#06b6d4;--teal-d:#0891b2;--navy:#0f2342;--text:#1a2744;--muted:#64748b;--bg:#f8fafc;--border:rgba(6,182,212,0.15);}
html,body{min-height:100vh;background:#fff;color:var(--text);font-family:'Zen Kaku Gothic New',sans-serif;-webkit-font-smoothing:antialiased;}
nav{position:sticky;top:0;z-index:100;height:64px;display:flex;align-items:center;padding:0 56px;background:rgba(255,255,255,0.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.nav-logo{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--navy);}
.nav-logo-icon{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--teal),var(--teal-d));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;}

main{min-height:calc(100vh - 64px - 60px);display:flex;align-items:center;justify-content:center;padding:48px 24px;}
.wrap{max-width:640px;width:100%;text-align:center;}
.code-label{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--teal);margin-bottom:16px;}
.error-code{font-family:'Space Grotesk',sans-serif;font-size:120px;font-weight:800;letter-spacing:-4px;line-height:1;background:linear-gradient(135deg,var(--teal),var(--teal-d));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;margin-bottom:24px;}
h1{font-size:24px;font-weight:900;color:var(--navy);letter-spacing:-0.5px;margin-bottom:16px;line-height:1.5;}
.sub{font-size:14px;color:var(--muted);line-height:1.8;margin-bottom:40px;}
.cta{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;background:linear-gradient(135deg,var(--teal),var(--teal-d));color:#fff;text-decoration:none;border-radius:999px;font-size:14px;font-weight:700;letter-spacing:0.5px;box-shadow:0 8px 24px rgba(6,182,212,0.28);transition:transform 0.2s ease,box-shadow 0.2s ease;}
.cta:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(6,182,212,0.38);}
.cta-arrow{font-family:'Space Grotesk',sans-serif;font-weight:700;}

.footer{text-align:center;padding:20px 24px;border-top:1px solid var(--border);color:var(--muted);font-size:12px;}

@media (max-width:560px){
  nav{padding:0 20px;}
  .error-code{font-size:88px;letter-spacing:-3px;}
  h1{font-size:20px;}
}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">
    <div class="nav-logo-icon">CS</div>
    CS<b style="color:var(--teal)">LINK</b>
  </a>
</nav>

<main>
  <div class="wrap">
    <div class="code-label">Page Not Found</div>
    <div class="error-code">404</div>
    <h1>お探しのページは見つかりませんでした</h1>
    <p class="sub">
      URLが変更されたか、削除された可能性があります。<br>
      トップページから改めてお探しください。
    </p>
    <a href="/" class="cta">
      トップへ戻る
      <span class="cta-arrow">→</span>
    </a>
  </div>
</main>

<footer class="footer">
  <div>&copy; <span id="year"></span> facing株式会社. All rights reserved.</div>
</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();
</script>
</body>
</html>
