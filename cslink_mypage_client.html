<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マイページ | CSLINK — 企業様向け</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--teal:#06b6d4;--teal-d:#0891b2;--navy:#0f2342;--navy-m:#1e3a5f;--text:#1a2744;--muted:#64748b;--bg:#f0f7fa;--white:#fff;--border:#e2e8f0;}
body{font-family:'Zen Kaku Gothic New',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ヘッダー */
.header{background:var(--navy);height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 40px;}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-icon{width:28px;height:28px;background:var(--teal);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;font-family:'Space Grotesk',sans-serif;}
.logo-text{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:#fff;}
.logo-text b{color:var(--teal);}
.header-badge{background:rgba(6,182,212,0.2);color:var(--teal);font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;font-family:'Space Grotesk',sans-serif;}

/* ログイン画面 */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 64px);padding:40px 20px;}
.login-card{background:var(--white);border-radius:20px;padding:48px 40px;width:420px;box-shadow:0 8px 32px rgba(15,35,66,0.12);}
.login-eyebrow{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;color:var(--teal);text-transform:uppercase;margin-bottom:16px;}
.login-title{font-size:24px;font-weight:900;color:var(--navy);margin-bottom:8px;}
.login-desc{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:32px;}
.form-label{font-size:12px;font-weight:700;color:var(--muted);display:block;margin-bottom:8px;}
.form-input{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;outline:none;transition:border .2s;font-family:'Zen Kaku Gothic New',sans-serif;}
.form-input:focus{border-color:var(--teal);}
.submit-btn{width:100%;padding:14px;background:var(--teal);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:20px;transition:all .2s;font-family:'Zen Kaku Gothic New',sans-serif;}
.submit-btn:hover{background:var(--teal-d);transform:translateY(-1px);}
.submit-btn:disabled{opacity:.6;transform:none;cursor:not-allowed;}
.form-err{color:#ef4444;font-size:13px;margin-top:12px;display:none;}
.form-note{font-size:12px;color:var(--muted);text-align:center;margin-top:16px;}

/* メイン画面 */
#mainScreen{display:none;}
.content{max-width:900px;margin:0 auto;padding:40px 24px;}

/* ウェルカム */
.welcome-card{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-m) 100%);border-radius:18px;padding:32px 40px;margin-bottom:32px;color:#fff;position:relative;overflow:hidden;}
.welcome-card::after{content:'';position:absolute;right:-40px;top:-40px;width:200px;height:200px;background:rgba(6,182,212,0.1);border-radius:50%;}
.welcome-eyebrow{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--teal);text-transform:uppercase;margin-bottom:8px;}
.welcome-name{font-size:22px;font-weight:900;margin-bottom:4px;}
.welcome-sub{font-size:13px;color:rgba(255,255,255,0.7);}
.logout-btn{position:absolute;top:24px;right:24px;background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2);padding:7px 16px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'Zen Kaku Gothic New',sans-serif;}

/* ステータスカード */
.status-section{margin-bottom:32px;}
.section-title{font-size:16px;font-weight:900;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.section-title::before{content:'';width:4px;height:18px;background:var(--teal);border-radius:2px;display:inline-block;}
.status-card{background:var(--white);border-radius:14px;padding:24px;border:1px solid var(--border);}
.status-timeline{display:flex;align-items:center;gap:0;margin:20px 0;}
.status-step{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;}
.status-step::after{content:'';position:absolute;top:16px;left:calc(50% + 16px);width:calc(100% - 32px);height:2px;background:var(--border);}
.status-step:last-child::after{display:none;}
.step-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2px solid var(--border);background:var(--white);color:var(--muted);z-index:1;}
.step-dot.done{background:var(--teal);border-color:var(--teal);color:#fff;}
.step-dot.active{background:var(--navy);border-color:var(--navy);color:#fff;box-shadow:0 0 0 4px rgba(6,182,212,0.2);}
.step-label{font-size:11px;color:var(--muted);margin-top:8px;text-align:center;font-weight:600;}
.step-label.active{color:var(--navy);font-weight:700;}

/* 登録詳細 */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px;}
.detail-item{padding:12px;background:var(--bg);border-radius:10px;}
.detail-label{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:4px;}
.detail-value{font-size:13px;color:var(--text);}
.detail-item.full{grid-column:1/-1;}

/* マッチングカード */
.match-card{background:var(--white);border-radius:14px;padding:24px;border:1px solid var(--border);margin-bottom:16px;}
.match-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;}
.match-name{font-size:17px;font-weight:800;color:var(--navy);}
.match-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.match-score{background:linear-gradient(135deg,var(--teal),var(--teal-d));color:#fff;font-size:22px;font-weight:900;padding:8px 16px;border-radius:10px;font-family:'Space Grotesk',sans-serif;}
.match-score span{font-size:11px;font-weight:400;display:block;text-align:center;}
.match-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.tag{background:rgba(6,182,212,0.1);color:var(--teal-d);font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;}
.match-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-proposed{background:#ede9fe;color:#5b21b6;}
.badge-accepted{background:#d1fae5;color:#065f46;}
.badge-contracted{background:#dbeafe;color:#1e40af;}
.badge-rejected{background:#fee2e2;color:#991b1b;}

/* メッセージ */
.msg-section{margin-top:20px;border-top:1px solid var(--border);padding-top:20px;}
.msg-section-title{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:12px;}
.msg-list{max-height:240px;overflow-y:auto;margin-bottom:12px;display:flex;flex-direction:column;gap:8px;}
.msg-bubble{padding:10px 14px;border-radius:12px;font-size:13px;max-width:85%;}
.msg-bubble.mine{background:var(--teal);color:#fff;align-self:flex-end;border-bottom-right-radius:4px;}
.msg-bubble.theirs{background:#f1f5f9;color:var(--text);align-self:flex-start;border-bottom-left-radius:4px;}
.msg-bubble.admin{background:#fef3c7;color:#92400e;align-self:center;border-radius:8px;font-size:12px;}
.msg-meta{font-size:10px;opacity:.7;margin-top:4px;}
.msg-input-row{display:flex;gap:10px;}
.msg-input{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;outline:none;font-family:'Zen Kaku Gothic New',sans-serif;}
.msg-input:focus{border-color:var(--teal);}
.msg-send{padding:10px 20px;background:var(--teal);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}

/* 空状態 */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-icon{font-size:48px;margin-bottom:16px;}
.empty-title{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:8px;}
.empty-desc{font-size:13px;line-height:1.7;}
.empty-btn{display:inline-block;margin-top:20px;padding:12px 28px;background:var(--teal);color:#fff;border-radius:10px;text-decoration:none;font-weight:700;font-size:14px;}
</style>
</head>
<body>

<div class="header">
  <a href="index.html" class="logo">
    <div class="logo-icon">CS</div>
    <div class="logo-text">CS<b>LINK</b></div>
  </a>
  <span class="header-badge">企業マイページ</span>
</div>

<!-- ログイン -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-eyebrow">FOR COMPANIES</div>
    <div class="login-title">マイページにログイン</div>
    <p class="login-desc">ご登録時のメールアドレスを入力してください。マッチング状況や担当者からのメッセージを確認できます。</p>
    <label class="form-label">登録メールアドレス</label>
    <input type="email" class="form-input" id="emailInput" placeholder="taro@example.com" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="submit-btn" id="loginBtn" onclick="doLogin()">マイページを表示する →</button>
    <p class="form-err" id="loginErr">このメールアドレスでの登録が見つかりません。</p>
    <p class="form-note">登録がお済みでない方は<a href="cslink_register_client.html" style="color:var(--teal)">こちら</a>から登録できます</p>
  </div>
</div>

<!-- メイン -->
<div id="mainScreen">
  <div class="content">

    <!-- ウェルカム -->
    <div class="welcome-card">
      <button class="logout-btn" onclick="doLogout()">ログアウト</button>
      <div class="welcome-eyebrow">COMPANY DASHBOARD</div>
      <div class="welcome-name" id="welcomeName">—</div>
      <div class="welcome-sub" id="welcomeSub">—</div>
    </div>

    <!-- ステータス -->
    <div class="status-section">
      <div class="section-title">登録ステータス</div>
      <div class="status-card">
        <div class="status-timeline">
          <div class="status-step" id="step-registered">
            <div class="step-dot done">✓</div>
            <div class="step-label">登録完了</div>
          </div>
          <div class="status-step" id="step-reviewing">
            <div class="step-dot" id="dot-reviewing">2</div>
            <div class="step-label" id="lbl-reviewing">確認中</div>
          </div>
          <div class="status-step" id="step-matched">
            <div class="step-dot" id="dot-matched">3</div>
            <div class="step-label" id="lbl-matched">マッチング</div>
          </div>
          <div class="status-step">
            <div class="step-dot" id="dot-contracted">4</div>
            <div class="step-label" id="lbl-contracted">成約</div>
          </div>
        </div>
        <div id="statusMessage" style="text-align:center;font-size:13px;color:var(--muted);padding:8px;"></div>
      </div>
    </div>

    <!-- 登録内容 -->
    <div class="status-section">
      <div class="section-title">登録内容</div>
      <div class="status-card">
        <div class="detail-grid" id="detailGrid"></div>
      </div>
    </div>

    <!-- マッチング一覧 -->
    <div class="status-section">
      <div class="section-title">マッチング中のCSプロ</div>
      <div id="matchingsList"></div>
    </div>

  </div>
</div>

<script>
const SUPABASE_URL = 'https://xatjfhleqgubgrnqzxrs.supabase.co';
const SUPABASE_KEY = 'sb_publishable_TWPuwEddFu3sgGDGSlnFFA_HaLiP7Tw';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentCompany = null;

async function doLogin(){
  const email = document.getElementById('emailInput').value.trim();
  if(!email){ alert('メールアドレスを入力してください'); return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = '確認中…';

  const {data, error} = await db.from('companies').select('*').eq('email', email).single();
  btn.disabled = false; btn.textContent = 'マイページを表示する →';

  if(error || !data){
    document.getElementById('loginErr').style.display = 'block';
    return;
  }
  currentCompany = data;
  document.getElementById('loginErr').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainScreen').style.display = 'block';
  renderMain();
}

function doLogout(){
  currentCompany = null;
  document.getElementById('mainScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('emailInput').value = '';
}

function renderMain(){
  const c = currentCompany;
  document.getElementById('welcomeName').textContent = c.name;
  document.getElementById('welcomeSub').textContent = `登録日：${fmtDate(c.created_at)}　|　${c.industry||''}`;
  renderStatus(c.status);
  renderDetail(c);
  loadMatchings(c.id);
}

function renderStatus(status){
  const steps = [
    {id:'reviewing', label:'確認中', statuses:['reviewing','matched','closed']},
    {id:'matched', label:'マッチング', statuses:['matched','closed']},
    {id:'contracted', label:'成約', statuses:['closed']}
  ];
  const msgs = {
    pending: '⏳ ご登録ありがとうございます。facing担当者が内容を確認中です。24時間以内にご連絡します。',
    reviewing: '🔍 担当者がCS課題を分析し、最適なCSプロを選定中です。',
    matched: '🎉 マッチングが完了しました！下記のCSプロをご確認ください。',
    closed: '✅ プロジェクトが完了しました。またのご利用をお待ちしています。'
  };

  const currentIdx = {pending:0, reviewing:1, matched:2, closed:3}[status] || 0;
  steps.forEach((s, i) => {
    const dot = document.getElementById('dot-'+s.id);
    const lbl = document.getElementById('lbl-'+s.id);
    if(i < currentIdx){ dot.textContent = '✓'; dot.className = 'step-dot done'; lbl.className = 'step-label'; }
    else if(i === currentIdx){ dot.className = 'step-dot active'; lbl.className = 'step-label active'; }
    else { dot.className = 'step-dot'; }
  });
  document.getElementById('statusMessage').textContent = msgs[status] || '';
}

function renderDetail(c){
  const fields = [
    {label:'会社名', value:c.name},
    {label:'業種', value:c.industry},
    {label:'従業員数', value:c.size},
    {label:'CS課題', value:c.challenges, full:true},
    {label:'希望稼働形態', value:c.worktype},
    {label:'希望開始時期', value:c.starttime},
    {label:'予算感', value:c.budget},
  ];
  document.getElementById('detailGrid').innerHTML = fields.map(f=>
    `<div class="detail-item${f.full?' full':''}">
      <div class="detail-label">${f.label}</div>
      <div class="detail-value">${esc(f.value||'—')}</div>
    </div>`
  ).join('');
}

async function loadMatchings(companyId){
  const {data:matchings} = await db.from('matchings').select('*').eq('company_id', companyId).order('created_at',{ascending:false});
  const container = document.getElementById('matchingsList');

  if(!matchings || !matchings.length){
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <div class="empty-title">マッチング処理中</div>
        <div class="empty-desc">AIが最適なCSプロを選定中です。<br>マッチングが完了次第、こちらに表示されます。</div>
      </div>`;
    return;
  }

  // プロ情報も取得
  const proIds = matchings.map(m=>m.professional_id);
  const {data:pros} = await db.from('professionals').select('*').in('id', proIds);

  container.innerHTML = matchings.map(m => {
    const pro = pros?.find(p=>p.id===m.professional_id);
    if(!pro) return '';
    const statusLabel = {proposed:'提案中',accepted:'承諾済',rejected:'見送り',contracted:'成約',closed:'終了'}[m.status]||m.status;
    const badgeClass = 'badge-'+(m.status==='contracted'?'contracted':m.status==='accepted'?'accepted':m.status==='rejected'?'rejected':'proposed');
    const tags = (pro.specialties||'').split('、').filter(Boolean).slice(0,4);
    return `
    <div class="match-card" id="match-${m.id}">
      <div class="match-header">
        <div>
          <div class="match-name">${esc(pro.name)}</div>
          <div class="match-sub">${esc(pro.activity||'')}　|　CS経験 ${esc(pro.experience||'—')}</div>
          <div style="margin-top:8px"><span class="match-badge ${badgeClass}">${statusLabel}</span></div>
        </div>
        <div class="match-score">${m.match_score||'—'}<span>${m.match_score?'% マッチ':''}</span></div>
      </div>
      <div class="match-tags">${tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>
      <div style="font-size:13px;color:var(--muted);line-height:1.8;background:var(--bg);padding:12px;border-radius:10px;">
        <strong style="color:var(--navy)">実績：</strong>${esc(pro.achievement||'—').substring(0,150)}${pro.achievement?.length>150?'…':''}
      </div>
      <div class="msg-section">
        <div class="msg-section-title">💬 担当者・CSプロとのメッセージ</div>
        <div class="msg-list" id="msgs-${m.id}"><div style="text-align:center;color:var(--muted);font-size:13px;padding:20px">読み込み中...</div></div>
        <div class="msg-input-row">
          <input class="msg-input" id="msginput-${m.id}" placeholder="メッセージを入力…">
          <button class="msg-send" onclick="sendMsg('${m.id}','${companyId}','company')">送信</button>
        </div>
      </div>
    </div>`;
  }).join('');

  // メッセージ読み込み
  for(const m of matchings){
    await loadMessages(m.id, companyId);
  }
}

async function loadMessages(matchingId, companyId){
  const {data:msgs} = await db.from('messages').select('*').eq('matching_id',matchingId).order('created_at');
  const container = document.getElementById('msgs-'+matchingId);
  if(!container) return;
  if(!msgs||!msgs.length){
    container.innerHTML='<div style="text-align:center;color:var(--muted);font-size:13px;padding:20px">まだメッセージはありません</div>';
    return;
  }
  container.innerHTML = msgs.map(msg=>{
    const ismine = msg.sender_type==='company' && msg.sender_id===companyId;
    const isadmin = msg.sender_type==='admin';
    const cls = ismine?'mine':isadmin?'admin':'theirs';
    const who = {company:'あなた',professional:'CSプロ',admin:'CSLINK運営'}[msg.sender_type];
    return `<div class="msg-bubble ${cls}">
      ${esc(msg.content)}
      <div class="msg-meta">${who} · ${fmtDate(msg.created_at)}</div>
    </div>`;
  }).join('');
  container.scrollTop = container.scrollHeight;
}

async function sendMsg(matchingId, senderId, senderType){
  const input = document.getElementById('msginput-'+matchingId);
  const content = input?.value.trim();
  if(!content) return;
  const {error} = await db.from('messages').insert({
    matching_id: matchingId,
    sender_type: senderType,
    sender_id: senderId,
    content
  });
  if(error){alert('送信に失敗しました'); return;}
  input.value = '';
  await loadMessages(matchingId, senderId);
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(d){if(!d)return'—';const dt=new Date(d);return`${dt.getFullYear()}/${dt.getMonth()+1}/${dt.getDate()}`;}

document.getElementById('emailInput').focus();
</script>
</body>
</html>
